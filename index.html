<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel TV</title>
    
    <style>
        /* ESTILOS MUY SIMPLES - TV compatible */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        
        /* PANTALLA DE CARGA MEJORADA */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #fff;
            border-radius: 50%;
            animation: girar 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* CARRUSEL */
        .carrusel {
            width: 100%;
            height: 100%;
            position: relative;
            display: none; /* Oculto hasta cargar */
        }
        
        .imagen-container {
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .imagen-container.activa {
            display: flex;
        }
        
        .imagen-carrusel {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* CONTROLES */
        .controles {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        
        .puntos {
            display: inline-flex;
            gap: 15px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
        }
        
        .punto {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
        }
        
        .punto.activo {
            background: white;
        }
        
        .contador {
            position: absolute;
            bottom: 100px;
            right: 30px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
        }
        
        /* BOTONES DE FLECHA */
        .flecha {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            font-size: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }
        
        .flecha.izquierda {
            left: 20px;
        }
        
        .flecha.derecha {
            right: 20px;
        }
        
        /* ERROR */
        .error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.9);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 80%;
            display: none;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE CARGA -->
    <div id="cargando" class="loading">
        <div class="spinner"></div>
        <h2 style="margin-bottom: 10px;">Cargando Carrusel</h2>
        <p id="estado-carga">Conectando...</p>
    </div>
    
    <!-- MENSAJE DE ERROR -->
    <div id="error" class="error">
        <h3>Error de Conexión</h3>
        <p id="mensaje-error"></p>
        <button onclick="recargar()" style="margin-top: 20px; padding: 10px 20px; background: white; border: none; border-radius: 5px; cursor: pointer;">
            Reintentar
        </button>
    </div>
    
    <!-- CARRUSEL -->
    <div id="carrusel" class="carrusel">
        <!-- Imágenes se insertan aquí -->
    </div>
    
    <!-- CONTROLES -->
    <div class="controles" id="controles" style="display: none;">
        <div class="puntos" id="puntos">
            <!-- Puntos se insertan aquí -->
        </div>
    </div>
    
    <div class="contador" id="contador" style="display: none;">0/0</div>
    
    <button class="flecha izquierda" id="btnAnterior" style="display: none;">◀</button>
    <button class="flecha derecha" id="btnSiguiente" style="display: none;">▶</button>

<script>
// ============================================
// CONFIGURACIÓN SIMPLIFICADA
// ============================================
const SUPABASE_URL = 'https://bgavgiajuycoenjjdlhg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UJiY23LT_8zNLtLUx0guWw_l760sXI7';

// ============================================
// VARIABLES
// ============================================
let imagenes = [];
let imagenActual = 0;
let intervalo;
let carruselElement;
let cargandoElement;
let errorElement;

// ============================================
// FUNCIONES PRINCIPALES - TV COMPATIBLE
// ============================================

// INICIALIZAR TODO CUANDO SE CARGA LA PÁGINA
window.onload = function() {
    console.log("Página cargada - TV LG");
    
    // Obtener elementos
    carruselElement = document.getElementById('carrusel');
    cargandoElement = document.getElementById('cargando');
    errorElement = document.getElementById('error');
    
    // Iniciar secuencia de carga
    setTimeout(iniciarCarrusel, 100);
};

// INICIAR CARRUSEL
function iniciarCarrusel() {
    actualizarEstado('Cargando imágenes...');
    
    // 1. Primero cargar imágenes desde localStorage si existen
    cargarDesdeLocalStorage();
    
    // 2. Intentar conectar a Supabase
    setTimeout(conectarSupabase, 500);
    
    // 3. Mostrar algo aunque falle todo
    setTimeout(function() {
        if (imagenes.length === 0) {
            usarImagenesDemo();
        }
    }, 3000);
}

// ACTUALIZAR ESTADO EN PANTALLA DE CARGA
function actualizarEstado(mensaje) {
    const elemento = document.getElementById('estado-carga');
    if (elemento) elemento.textContent = mensaje;
    console.log(mensaje);
}

// CONECTAR A SUPABASE (versión simplificada)
function conectarSupabase() {
    actualizarEstado('Conectando a servidor...');
    
    // Usar fetch directo en lugar de SDK (más compatible)
    fetch(`${SUPABASE_URL}/rest/v1/images?select=*`, {
        method: 'GET',
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        }
    })
    .then(response => {
        if (!response.ok) throw new Error('Error HTTP: ' + response.status);
        return response.json();
    })
    .then(datos => {
        console.log('Imágenes cargadas:', datos.length);
        
        if (datos && datos.length > 0) {
            // Filtrar solo imágenes con URL válida
            imagenes = datos.filter(img => img.url && img.url.startsWith('http'));
            
            if (imagenes.length > 0) {
                // Guardar en localStorage
                guardarEnLocalStorage();
                // Mostrar carrusel
                mostrarCarrusel();
            } else {
                throw new Error('No hay imágenes válidas');
            }
        } else {
            throw new Error('No hay imágenes');
        }
    })
    .catch(error => {
        console.error('Error cargando imágenes:', error);
        
        // Intentar con localStorage
        if (imagenes.length === 0) {
            cargarDesdeLocalStorage();
        }
        
        // Si aún no hay imágenes, usar demo
        if (imagenes.length === 0) {
            usarImagenesDemo();
        } else {
            mostrarCarrusel();
        }
    });
}

// USAR IMÁGENES DE DEMOSTRACIÓN
function usarImagenesDemo() {
    actualizarEstado('Usando imágenes de demostración...');
    
    imagenes = [
        { 
            id: 1, 
            url: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1920', 
            title: 'Montañas' 
        },
        { 
            id: 2, 
            url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920', 
            title: 'Paisaje' 
        },
        { 
            id: 3, 
            url: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1920', 
            title: 'Cielo' 
        }
    ];
    
    guardarEnLocalStorage();
    mostrarCarrusel();
}

// MOSTRAR CARRUSEL
function mostrarCarrusel() {
    console.log('Mostrando carrusel con', imagenes.length, 'imágenes');
    
    // Ocultar pantalla de carga
    if (cargandoElement) {
        cargandoElement.style.display = 'none';
    }
    
    // Limpiar carrusel
    carruselElement.innerHTML = '';
    
    // Crear contenedores para cada imagen
    imagenes.forEach((imagen, index) => {
        const contenedor = document.createElement('div');
        contenedor.className = 'imagen-container';
        contenedor.id = 'imagen-' + index;
        
        const img = document.createElement('img');
        img.className = 'imagen-carrusel';
        img.alt = imagen.title || 'Imagen ' + (index + 1);
        img.loading = 'eager'; // Forzar carga inmediata
        
        // Cargar imagen con callback
        cargarImagenConTimeout(img, imagen.url, index);
        
        contenedor.appendChild(img);
        carruselElement.appendChild(contenedor);
    });
    
    // Mostrar primera imagen
    mostrarImagen(0);
    
    // Mostrar controles
    mostrarControles();
    
    // Iniciar auto-cambio
    iniciarAutoCambio();
}

// CARGAR IMAGEN CON TIMEOUT
function cargarImagenConTimeout(elementoImg, url, indice) {
    let cargada = false;
    
    // Configurar eventos
    elementoImg.onload = function() {
        cargada = true;
        console.log('Imagen', indice, 'cargada:', url.substring(0, 50));
    };
    
    elementoImg.onerror = function() {
        console.error('Error cargando imagen', indice);
    };
    
    // Intentar cargar
    elementoImg.src = url;
    
    // Timeout: si no carga en 10 segundos, usar placeholder
    setTimeout(function() {
        if (!cargada) {
            console.log('Timeout imagen', indice);
            elementoImg.src = 'https://via.placeholder.com/1920x1080/333/fff?text=Imagen+' + (indice+1);
        }
    }, 10000);
}

// MOSTRAR IMAGEN ESPECÍFICA
function mostrarImagen(indice) {
    // Validar índice
    if (indice < 0) indice = imagenes.length - 1;
    if (indice >= imagenes.length) indice = 0;
    
    imagenActual = indice;
    
    // Ocultar todas las imágenes
    document.querySelectorAll('.imagen-container').forEach(container => {
        container.classList.remove('activa');
    });
    
    // Mostrar imagen actual
    const imagenActualElement = document.getElementById('imagen-' + indice);
    if (imagenActualElement) {
        imagenActualElement.classList.add('activa');
    }
    
    // Actualizar puntos
    actualizarPuntos();
    
    // Actualizar contador
    actualizarContador();
}

// MOSTRAR CONTROLES
function mostrarControles() {
    // Mostrar carrusel
    carruselElement.style.display = 'block';
    
    // Crear puntos
    const puntosElement = document.getElementById('puntos');
    if (puntosElement) {
        puntosElement.innerHTML = '';
        
        imagenes.forEach((_, index) => {
            const punto = document.createElement('div');
            punto.className = 'punto' + (index === 0 ? ' activo' : '');
            punto.onclick = function() { mostrarImagen(index); };
            puntosElement.appendChild(punto);
        });
        
        document.getElementById('controles').style.display = 'block';
    }
    
    // Configurar botones
    const btnAnterior = document.getElementById('btnAnterior');
    const btnSiguiente = document.getElementById('btnSiguiente');
    
    if (btnAnterior) {
        btnAnterior.style.display = 'block';
        btnAnterior.onclick = function() {
            mostrarImagen(imagenActual - 1);
            reiniciarIntervalo();
        };
    }
    
    if (btnSiguiente) {
        btnSiguiente.style.display = 'block';
        btnSiguiente.onclick = function() {
            mostrarImagen(imagenActual + 1);
            reiniciarIntervalo();
        };
    }
    
    // Mostrar contador
    document.getElementById('contador').style.display = 'block';
}

// ACTUALIZAR PUNTOS
function actualizarPuntos() {
    document.querySelectorAll('.punto').forEach((punto, index) => {
        if (index === imagenActual) {
            punto.classList.add('activo');
        } else {
            punto.classList.remove('activo');
        }
    });
}

// ACTUALIZAR CONTADOR
function actualizarContador() {
    const contador = document.getElementById('contador');
    if (contador) {
        contador.textContent = (imagenActual + 1) + '/' + imagenes.length;
    }
}

// INICIAR AUTO-CAMBIO
function iniciarAutoCambio() {
    // Limpiar intervalo anterior
    if (intervalo) clearInterval(intervalo);
    
    // Solo si hay más de una imagen
    if (imagenes.length > 1) {
        intervalo = setInterval(function() {
            mostrarImagen(imagenActual + 1);
        }, 10000); // 10 segundos
    }
}

// REINICIAR INTERVALO
function reiniciarIntervalo() {
    iniciarAutoCambio();
}

// LOCALSTORAGE
function guardarEnLocalStorage() {
    try {
        localStorage.setItem('carrusel_imagenes', JSON.stringify(imagenes));
        localStorage.setItem('carrusel_ultima_actualizacion', new Date().toISOString());
    } catch (e) {
        console.log('No se pudo guardar en localStorage');
    }
}

function cargarDesdeLocalStorage() {
    try {
        const guardadas = localStorage.getItem('carrusel_imagenes');
        const ultimaActualizacion = localStorage.getItem('carrusel_ultima_actualizacion');
        
        if (guardadas && ultimaActualizacion) {
            const fechaGuardada = new Date(ultimaActualizacion);
            const ahora = new Date();
            const diferenciaHoras = (ahora - fechaGuardada) / (1000 * 60 * 60);
            
            // Usar cache si tiene menos de 1 hora
            if (diferenciaHoras < 1) {
                imagenes = JSON.parse(guardadas);
                actualizarEstado('Cargando desde caché...');
                return true;
            }
        }
    } catch (e) {
        console.log('Error cargando desde localStorage');
    }
    return false;
}

// MANEJO DE ERRORES
function mostrarError(mensaje) {
    console.error('Error:', mensaje);
    
    if (cargandoElement) cargandoElement.style.display = 'none';
    if (errorElement) {
        document.getElementById('mensaje-error').textContent = mensaje;
        errorElement.style.display = 'block';
    }
}

function recargar() {
    location.reload();
}

// TECLADO (para control remoto)
document.onkeydown = function(e) {
    switch(e.key) {
        case 'ArrowLeft':
            mostrarImagen(imagenActual - 1);
            reiniciarIntervalo();
            break;
        case 'ArrowRight':
        case ' ':
            mostrarImagen(imagenActual + 1);
            reiniciarIntervalo();
            break;
    }
};
</script>
</body>
</html>
