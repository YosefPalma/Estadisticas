<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Carrusel de Imágenes</title>
    
    <style>
        /* MANTÉN TODO EL CSS IGUAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial; }
        .carrusel-container { width: 100vw; height: 100vh; position: relative; background: #000; }
        .carrusel-track { display: flex; height: 100%; transition: transform 0.5s ease-in-out; }
        .carrusel-slide { min-width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .carrusel-image { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }
        .carrusel-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; }
        .carrusel-btn { pointer-events: auto; background: rgba(0,0,0,0.5); border: none; width: 60px; height: 60px; border-radius: 50%; color: white; font-size: 24px; cursor: pointer; margin: 0 20px; display: flex; align-items: center; justify-content: center; }
        .carrusel-indicators { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
        .indicator.active { background: #fff; transform: scale(1.2); }
        .image-counter { position: absolute; bottom: 50px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; z-index: 10; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 1000; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,0,0,0.8); color: white; padding: 20px 30px; border-radius: 10px; text-align: center; max-width: 80%; z-index: 1000; display: none; }
    </style>
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner"></div>
        <p id="loading-text">Cargando...</p>
    </div>
    
    <div class="carrusel-container" id="carrusel-container">
        <div class="carrusel-track" id="carrusel-track"></div>
        <div class="carrusel-controls">
            <button class="carrusel-btn" id="prev-btn">◀</button>
            <button class="carrusel-btn" id="next-btn">▶</button>
        </div>
        <div class="image-counter" id="image-counter">0 / 0</div>
        <div class="carrusel-indicators" id="carrusel-indicators"></div>
    </div>

<script>
// ============================================
// CONFIGURACIÓN - AQUÍ PONES TUS IMÁGENES
// ============================================
var IMAGENES_CONFIG = [
    {
        url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1920&auto=format&fit=crop",
        title: "Paisaje Montañoso"
    },
    {
        url: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&auto=format&fit=crop",
        title: "Aurora Boreal"
    },
    {
        url: "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1920&auto=format&fit=crop",
        title: "Atardecer"
    }
];

// ============================================
// VARIABLES GLOBALES
// ============================================
var currentSlide = 0;
var autoSlideInterval;
var images = [];

// ============================================
// ELEMENTOS DOM
// ============================================
var carruselTrack = document.getElementById('carrusel-track');
var prevBtn = document.getElementById('prev-btn');
var nextBtn = document.getElementById('next-btn');
var carruselIndicators = document.getElementById('carrusel-indicators');
var imageCounter = document.getElementById('image-counter');
var loadingScreen = document.getElementById('loading-screen');
var loadingText = document.getElementById('loading-text');

// ============================================
// FUNCIONES PRINCIPALES
// ============================================

// INICIAR APLICACIÓN
function iniciarApp() {
    console.log("Iniciando carrusel para TV...");
    
    // Usar imágenes configuradas
    images = IMAGENES_CONFIG;
    
    if (images.length === 0) {
        mostrarError("No hay imágenes configuradas");
        return;
    }
    
    console.log("Cargando " + images.length + " imágenes...");
    
    // Crear carrusel
    crearCarrusel();
    
    // Mostrar primera imagen
    mostrarImagen(0);
    
    // Configurar eventos
    configurarEventos();
    
    // Ocultar loading
    ocultarLoading();
    
    // Iniciar auto-cambio
    iniciarAutoSlide();
    
    console.log("Carrusel listo ✓");
}

// CREAR CARRUSEL
function crearCarrusel() {
    carruselTrack.innerHTML = '';
    carruselIndicators.innerHTML = '';
    
    for (var i = 0; i < images.length; i++) {
        var imagen = images[i];
        
        // Crear slide
        var slide = document.createElement('div');
        slide.className = 'carrusel-slide';
        slide.id = 'slide-' + i;
        
        var img = document.createElement('img');
        img.className = 'carrusel-image';
        img.src = imagen.url;
        img.alt = imagen.title || 'Imagen ' + (i + 1);
        
        // Precargar imagen
        precargarImagen(imagen.url);
        
        slide.appendChild(img);
        carruselTrack.appendChild(slide);
        
        // Crear indicador
        var indicador = document.createElement('div');
        indicador.className = 'indicator';
        if (i === 0) indicador.className += ' active';
        
        (function(index) {
            indicador.addEventListener('click', function() {
                mostrarImagen(index);
            });
        })(i);
        
        carruselIndicators.appendChild(indicador);
    }
}

// PRECARGAR IMAGEN
function precargarImagen(url) {
    var img = new Image();
    img.src = url;
}

// MOSTRAR IMAGEN ESPECÍFICA
function mostrarImagen(indice) {
    if (indice < 0) indice = images.length - 1;
    if (indice >= images.length) indice = 0;
    
    currentSlide = indice;
    
    // Mover track
    carruselTrack.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
    
    // Actualizar indicadores
    var indicadores = document.querySelectorAll('.indicator');
    for (var i = 0; i < indicadores.length; i++) {
        if (i === currentSlide) {
            indicadores[i].className = 'indicator active';
        } else {
            indicadores[i].className = 'indicator';
        }
    }
    
    // Actualizar contador
    actualizarContador();
    
    // Reiniciar auto-slide
    reiniciarAutoSlide();
}

// ACTUALIZAR CONTADOR
function actualizarContador() {
    if (imageCounter) {
        imageCounter.textContent = (currentSlide + 1) + ' / ' + images.length;
    }
}

// AUTO-SLIDE
function iniciarAutoSlide() {
    clearInterval(autoSlideInterval);
    if (images.length > 1) {
        autoSlideInterval = setInterval(function() {
            siguienteSlide();
        }, 5000);
    }
}

function detenerAutoSlide() {
    clearInterval(autoSlideInterval);
}

function reiniciarAutoSlide() {
    detenerAutoSlide();
    iniciarAutoSlide();
}

function siguienteSlide() {
    mostrarImagen(currentSlide + 1);
}

function anteriorSlide() {
    mostrarImagen(currentSlide - 1);
}

// CONFIGURAR EVENTOS
function configurarEventos() {
    if (prevBtn) prevBtn.addEventListener('click', anteriorSlide);
    if (nextBtn) nextBtn.addEventListener('click', siguienteSlide);
    
    // Teclado
    document.addEventListener('keydown', function(e) {
        var key = e.key || e.keyCode;
        if (key === 'ArrowLeft' || key === 37) anteriorSlide();
        if (key === 'ArrowRight' || key === 39) siguienteSlide();
    });
    
    // Swipe
    var startX = 0;
    carruselTrack.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        detenerAutoSlide();
    });
    
    carruselTrack.addEventListener('touchend', function(e) {
        var endX = e.changedTouches[0].clientX;
        var diff = startX - endX;
        if (Math.abs(diff) > 50) {
            if (diff > 0) siguienteSlide();
            else anteriorSlide();
        }
        reiniciarAutoSlide();
    });
}

// OCULTAR LOADING
function ocultarLoading() {
    if (loadingScreen) {
        setTimeout(function() {
            loadingScreen.style.opacity = '0';
            setTimeout(function() {
                loadingScreen.style.display = 'none';
            }, 300);
        }, 500);
    }
}

// MOSTRAR ERROR
function mostrarError(mensaje) {
    console.error(mensaje);
    if (loadingText) loadingText.textContent = mensaje;
}

// ============================================
// INICIALIZAR
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    console.log("DOM cargado");
    
    // Iniciar después de un pequeño delay
    setTimeout(function() {
        iniciarApp();
    }, 100);
});
</script>
</body>
</html>
