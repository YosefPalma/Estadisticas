<!DOCTYPE html>
<html>
<head>
    <title>Carrusel Simple</title>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            background: black; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        .imagen {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s;
        }
        
        .imagen.activa {
            opacity: 1;
        }
        
        .contador {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <!-- IMÁGENES DIRECTAS (sin Supabase) -->
    <img class="imagen activa" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1920" alt="1">
    <img class="imagen" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920" alt="2">
    <img class="imagen" src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1920" alt="3">
    
    <div class="contador" id="contador">1/3</div>
    
    <script>
        // CÓDIGO SUPER SIMPLE
        var imagenes = document.querySelectorAll('.imagen');
        var contador = document.getElementById('contador');
        var indice = 0;
        var total = imagenes.length;
        
        function cambiarImagen() {
            // Ocultar todas
            imagenes.forEach(img => img.classList.remove('activa'));
            
            // Mostrar actual
            imagenes[indice].classList.add('activa');
            
            // Actualizar contador
            contador.textContent = (indice + 1) + '/' + total;
            
            // Siguiente
            indice++;
            if (indice >= total) indice = 0;
        }
        
        // Cambiar cada 5 segundos
        setInterval(cambiarImagen, 5000);
        
        // Mostrar contador inicial
        contador.textContent = '1/' + total;
    </script>
</body>
</html>
