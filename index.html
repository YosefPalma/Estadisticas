<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Carrusel de Imágenes - Google Drive</title>
    
    <style>
        /* ESTILOS BÁSICOS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        
        /* CONTENEDOR PRINCIPAL */
        .carrusel-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-color: #000;
        }
        
        /* PISTA DEL CARRUSEL */
        .carrusel-track {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        
        /* CADA SLIDE */
        .carrusel-slide {
            min-width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* IMAGEN */
        .carrusel-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Muestra toda la imagen */
            display: block;
            background-color: #000;
        }
        
        /* CONTROLES */
        .carrusel-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .carrusel-btn {
            pointer-events: auto;
            background-color: rgba(0, 0, 0, 0.6);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin: 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* INDICADORES */
        .carrusel-indicators {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }
        
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }
        
        .indicator.active {
            background-color: #ffffff;
            transform: scale(1.2);
        }
        
        /* CONTADOR */
        .image-counter {
            position: absolute;
            bottom: 50px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
        }
        
        /* PANTALLA DE CARGA */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* AJUSTES PARA TV */
        @media (hover: none) and (pointer: coarse) {
            .carrusel-btn {
                width: 70px;
                height: 70px;
                font-size: 30px;
                margin: 0 30px;
            }
            
            .indicator {
                width: 16px;
                height: 16px;
            }
            
            .image-counter {
                font-size: 18px;
                bottom: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE CARGA -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner"></div>
        <p id="loading-text">Cargando carrusel...</p>
    </div>
    
    <!-- CONTENEDOR DEL CARRUSEL -->
    <div class="carrusel-container" id="carrusel-container" style="display: none;">
        <div class="carrusel-track" id="carrusel-track">
            <!-- Las imágenes se insertarán aquí -->
        </div>
        
        <!-- CONTROLES -->
        <div class="carrusel-controls">
            <button class="carrusel-btn" id="prev-btn">◀</button>
            <button class="carrusel-btn" id="next-btn">▶</button>
        </div>
        
        <!-- CONTADOR -->
        <div class="image-counter" id="image-counter">0 / 0</div>
        
        <!-- INDICADORES -->
        <div class="carrusel-indicators" id="carrusel-indicators"></div>
    </div>

<script>


var IMAGENES_DRIVE = [
    {
        id: "1C_xr0JMRdlv0pcELAh-oaFBTwDFQoFK3", // REEMPLAZA con tu ID
        title: "Imagen 1"
    },
    {
        id: "1fvzHnMtoLdpL4kLwKqsXzflL8AYM4OHg", // REEMPLAZA con tu ID
        title: "Imagen 2"
    },
    {
        id: "1Q_EXP8w7ZkvEMjM4mAt4d4fLGlh0vCTP", // REEMPLAZA con tu ID
        title: "Imagen 3"
    }
];

// ============================================
// FUNCIÓN PARA CONVERTIR ID A URL DRIVE
// ============================================
function obtenerUrlDrive(idArchivo) {
    // Formato oficial de Google Drive para imágenes
    return "https://drive.google.com/uc?export=view&id=" + idArchivo;
}

// ============================================
// VARIABLES GLOBALES
// ============================================
var currentSlide = 0;
var autoSlideInterval;
var images = [];

// ============================================
// ELEMENTOS DOM
// ============================================
var carruselTrack = document.getElementById('carrusel-track');
var prevBtn = document.getElementById('prev-btn');
var nextBtn = document.getElementById('next-btn');
var carruselIndicators = document.getElementById('carrusel-indicators');
var imageCounter = document.getElementById('image-counter');
var loadingScreen = document.getElementById('loading-screen');
var loadingText = document.getElementById('loading-text');
var carruselContainer = document.getElementById('carrusel-container');

// ============================================
// FUNCIONES PRINCIPALES
// ============================================

// INICIAR APLICACIÓN
function iniciarApp() {
    console.log("🚀 Iniciando carrusel con Google Drive...");
    
    // Preparar imágenes con URLs de Drive
    prepararImagenesDrive();
    
    if (images.length === 0) {
        mostrarError("No hay imágenes configuradas");
        return;
    }
    
    console.log("📸 " + images.length + " imágenes preparadas");
    
    // Crear carrusel
    crearCarrusel();
    
    // Mostrar primera imagen
    mostrarImagen(0);
    
    // Configurar eventos
    configurarEventos();
    
    // Ocultar loading y mostrar carrusel
    ocultarLoading();
    
    // Iniciar auto-cambio
    iniciarAutoSlide();
    
    console.log("✅ Carrusel listo");
}

// PREPARAR IMÁGENES DE DRIVE
function prepararImagenesDrive() {
    images = [];
    
    for (var i = 0; i < IMAGENES_DRIVE.length; i++) {
        var imgConfig = IMAGENES_DRIVE[i];
        
        // Crear objeto imagen con URL de Drive
        var imagen = {
            id: imgConfig.id,
            url: obtenerUrlDrive(imgConfig.id),
            title: imgConfig.title || "Imagen " + (i + 1),
            cargada: false
        };
        
        images.push(imagen);
    }
}

// CREAR CARRUSEL
function crearCarrusel() {
    carruselTrack.innerHTML = '';
    carruselIndicators.innerHTML = '';
    
    for (var i = 0; i < images.length; i++) {
        var imagen = images[i];
        
        // Crear slide
        var slide = document.createElement('div');
        slide.className = 'carrusel-slide';
        slide.id = 'slide-' + i;
        
        // Crear elemento imagen
        var imgElement = document.createElement('img');
        imgElement.className = 'carrusel-image';
        imgElement.alt = imagen.title;
        imgElement.loading = 'eager'; // Carga inmediata
        
        // Precargar imagen con manejo de errores
        precargarImagenDrive(imagen.url, imgElement, i);
        
        slide.appendChild(imgElement);
        carruselTrack.appendChild(slide);
        
        // Crear indicador
        var indicador = document.createElement('div');
        indicador.className = 'indicator';
        if (i === 0) indicador.className += ' active';
        
        // Usar closure para capturar el índice
        (function(index) {
            indicador.addEventListener('click', function() {
                mostrarImagen(index);
            });
        })(i);
        
        carruselIndicators.appendChild(indicador);
    }
}

// PRECARGAR IMAGEN DE DRIVE CON MANEJO DE ERRORES
function precargarImagenDrive(url, imgElement, index) {
    var imgTest = new Image();
    
    imgTest.onload = function() {
        console.log("✅ Imagen " + (index + 1) + " cargada: " + url.substring(0, 50) + "...");
        imgElement.src = url;
        images[index].cargada = true;
        images[index].urlFunciona = url;
    };
    
    imgTest.onerror = function() {
        console.log("⚠️  Imagen " + (index + 1) + " no carga, probando alternativa...");
        
        // Intentar formato alternativo de Drive
        var id = images[index].id;
        var urlAlternativa = "https://lh3.googleusercontent.com/d/" + id + "=w1920";
        
        var imgTest2 = new Image();
        imgTest2.onload = function() {
            console.log("✅ Imagen " + (index + 1) + " cargada con formato alternativo");
            imgElement.src = urlAlternativa;
            images[index].cargada = true;
            images[index].urlFunciona = urlAlternativa;
        };
        
        imgTest2.onerror = function() {
            console.error("❌ No se pudo cargar imagen " + (index + 1));
            // Usar imagen de placeholder
            imgElement.src = "https://via.placeholder.com/1920x1080/333/fff?text=Imagen+" + (index + 1);
            imgElement.style.backgroundColor = "#222";
            images[index].cargada = false;
        };
        
        imgTest2.src = urlAlternativa;
    };
    
    imgTest.src = url;
}

// MOSTRAR IMAGEN ESPECÍFICA
function mostrarImagen(indice) {
    if (images.length === 0) return;
    
    // Validar índice
    if (indice < 0) indice = images.length - 1;
    if (indice >= images.length) indice = 0;
    
    currentSlide = indice;
    
    // Mover track
    carruselTrack.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
    
    // Actualizar indicadores
    var indicadores = document.querySelectorAll('.indicator');
    for (var i = 0; i < indicadores.length; i++) {
        if (i === currentSlide) {
            indicadores[i].className = 'indicator active';
        } else {
            indicadores[i].className = 'indicator';
        }
    }
    
    // Actualizar contador
    actualizarContador();
    
    // Reiniciar auto-slide
    reiniciarAutoSlide();
}

// ACTUALIZAR CONTADOR
function actualizarContador() {
    if (imageCounter) {
        imageCounter.textContent = (currentSlide + 1) + ' / ' + images.length;
    }
}

// AUTO-SLIDE
function iniciarAutoSlide() {
    clearInterval(autoSlideInterval);
    
    if (images.length > 1) {
        console.log("🔄 Auto-slide iniciado (5 segundos)");
        autoSlideInterval = setInterval(function() {
            siguienteSlide();
        }, 5000);
    }
}

function detenerAutoSlide() {
    clearInterval(autoSlideInterval);
}

function reiniciarAutoSlide() {
    detenerAutoSlide();
    iniciarAutoSlide();
}

function siguienteSlide() {
    mostrarImagen(currentSlide + 1);
}

function anteriorSlide() {
    mostrarImagen(currentSlide - 1);
}

// CONFIGURAR EVENTOS
function configurarEventos() {
    // Botones de navegación
    if (prevBtn) {
        prevBtn.addEventListener('click', function() {
            anteriorSlide();
        });
    }
    
    if (nextBtn) {
        nextBtn.addEventListener('click', function() {
            siguienteSlide();
        });
    }
    
    // Teclado (para control remoto del TV)
    document.addEventListener('keydown', function(e) {
        var key = e.key || e.keyCode;
        
        // Flecha izquierda
        if (key === 'ArrowLeft' || key === 'Left' || key === 37) {
            anteriorSlide();
        }
        // Flecha derecha
        else if (key === 'ArrowRight' || key === 'Right' || key === 39) {
            siguienteSlide();
        }
        // Espacio o Enter para pausar/reanudar
        else if (key === ' ' || key === 'Enter' || key === 32 || key === 13) {
            if (autoSlideInterval) {
                detenerAutoSlide();
                console.log("⏸️  Auto-slide pausado");
            } else {
                iniciarAutoSlide();
                console.log("▶️  Auto-slide reanudado");
            }
        }
    });
    
    // Swipe para pantallas táctiles
    var inicioX = 0;
    
    if (carruselTrack) {
        carruselTrack.addEventListener('touchstart', function(e) {
            inicioX = e.touches[0].clientX;
            detenerAutoSlide();
        }, { passive: true });
        
        carruselTrack.addEventListener('touchend', function(e) {
            var finX = e.changedTouches[0].clientX;
            var diferencia = inicioX - finX;
            var umbral = 50;
            
            if (Math.abs(diferencia) > umbral) {
                if (diferencia > 0) {
                    siguienteSlide();
                } else {
                    anteriorSlide();
                }
            }
            
            // Reanudar después de 3 segundos
            setTimeout(function() {
                iniciarAutoSlide();
            }, 3000);
        }, { passive: true });
    }
}

// OCULTAR PANTALLA DE CARGA
function ocultarLoading() {
    if (loadingScreen && carruselContainer) {
        setTimeout(function() {
            // Ocultar loading
            loadingScreen.style.opacity = '0';
            
            // Mostrar carrusel
            carruselContainer.style.display = 'block';
            carruselContainer.style.opacity = '0';
            
            setTimeout(function() {
                loadingScreen.style.display = 'none';
                carruselContainer.style.opacity = '1';
            }, 300);
        }, 800);
    }
}

// MOSTRAR ERROR
function mostrarError(mensaje) {
    console.error("❌ " + mensaje);
    if (loadingText) {
        loadingText.innerHTML = mensaje + '<br>' +
            '<button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#fff;color:#000;border:none;border-radius:5px;cursor:pointer;">' +
            'Reintentar</button>';
    }
}

// ============================================
// INICIALIZACIÓN
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    console.log("📄 DOM cargado");
    
    // Esperar un poco para asegurar que todo esté listo
    setTimeout(function() {
        iniciarApp();
    }, 100);
});

// Manejar visibilidad de la página (optimización para TV)
document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
        console.log("👻 Página oculta, pausando auto-slide");
        detenerAutoSlide();
    } else {
        console.log("👀 Página visible, reanudando auto-slide");
        iniciarAutoSlide();
    }
});
</script>

<!-- INSTRUCCIONES -->
<script>
// ============================================
// INSTRUCCIONES PARA CONFIGURAR
// ============================================
console.log("📋 INSTRUCCIONES PARA CONFIGURAR:");
console.log("1. Sube imágenes a Google Drive");
console.log("2. Comparte cada imagen como 'Cualquier persona con el enlace'");
console.log("3. Copia el ID del archivo (lo que está entre /d/ y /view)");
console.log("4. Reemplaza los IDs en el array IMAGENES_DRIVE");
console.log("5. Súbelo a Netlify y ábrelo en tu TV");
</script>

</body>
</html>
